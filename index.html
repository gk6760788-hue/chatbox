<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chatbox</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6dd5ed, #2193b0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Chat Container */
.chat-container {
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Header */
.chat-header {
    background: #2193b0;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Messages */
.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #2193b0;
    color: white;
    margin-left: auto;
}

.bot {
    background: #eee;
}

/* Input */
.chat-input {
    display: flex;
    border-top: 1px solid #ccc;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

.chat-input button {
    background: #2193b0;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="chat-container">
    <div class="chat-header">💬 Chatbox</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("messageInput");
    let message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    // Fake bot reply
    setTimeout(() => {
        let reply = getReply(message);
        addMessage(reply, "bot");
    }, 500);
}

function addMessage(text, type) {
    let chatBox = document.getElementById("chatBox");

    let msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello")) return "Hi 👋 How can I help?";
    if (msg.includes("college")) return "I can suggest colleges 🎓";
    if (msg.includes("course")) return "We have many courses!";
    if (msg.includes("bye")) return "Goodbye 😊";

    return "Sorry, I didn't understand 😅";
}

// Enter key support
document.getElementById("messageInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
